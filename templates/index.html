<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="中華民國專利行政實務 FAQ 檢索系統 - 提供發明、新型、設計專利申請與行政程序之專業解答。" />
  <title>專利行政實務 FAQ 智慧檢索系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;1,600&family=Space+Grotesk:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <div class="app-container">
    <!-- 左側側邊欄 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="header-main">
          <p class="sidebar-eyebrow">Intellectual Property Office Assistant</p>
          <h1 class="sidebar-title">專利行政實務<span class="highlight">智慧檢索</span></h1>
        </div>
        <button id="btn-sidebar-collapse" class="btn-sidebar-toggle" type="button" title="收起側邊欄">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 19l-7-7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      
      <!-- 縱向 Tab 切換導覽 -->
      <nav class="sidebar-nav">
        <button id="tab-chat" class="switch-btn active" type="button">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>智能助理</span>
        </button>
        <button id="tab-db" class="switch-btn" type="button">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 22V4c0-.5.2-1 .6-1.4C5 2.2 5.5 2 6 2h8l6 6v14c0 .5-.2 1-.6 1.4-.4.4-.9.6-1.4.6H6c-.5 0-1-.2-1.4-.6-.4-.4-.6-.9-.6-1.4z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>專利資料庫</span>
        </button>
      </nav>

      <!-- 新增：側邊欄隨機快捷問題探索區 -->
      <div class="sidebar-quick-prompts">
        <div class="quick-prompts-header">
          <span class="section-label">常見快捷詢問</span>
          <button id="btn-refresh-prompts" class="btn-refresh" type="button" title="換一批問題">
            <svg class="icon-refresh" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div id="quick-prompts-container" class="prompts-container">
          <!-- JS 將動態在此處加載卡片 -->
          <div class="prompt-card-skeleton"></div>
          <div class="prompt-card-skeleton"></div>
          <div class="prompt-card-skeleton"></div>
          <div class="prompt-card-skeleton"></div>
        </div>
      </div>

      <div class="sidebar-footer">
        <p class="sidebar-hint-text">提示：點選上方卡片可快速發送詢問。</p>
        <button id="btn-clear-chat" class="btn-clear-chat" type="button" title="清除對話紀錄">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>清除對話歷史</span>
        </button>
      </div>
    </aside>

    <!-- 右側主內容區 -->
    <main class="main-content">
      <!-- 展開側邊欄按鈕 -->
      <button id="btn-sidebar-expand" class="btn-sidebar-toggle-expand" type="button" title="展開側邊欄" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <!-- 智能助理視圖 -->
      <div id="chat-view" class="view-content active">
        <div id="chat-log" class="chat-log" aria-live="polite"></div>
        
        <div class="chat-input-area">
          <form id="chat-form" class="chat-input" autocomplete="off">
            <div class="input-wrapper">
              <input
                id="chat-text"
                name="message"
                type="text"
                placeholder="請輸入您的專利相關問題，或點選左側快捷問題..."
                required
              />
              <button type="submit" aria-label="發送詢問" title="發送詢問">
                <svg class="icon-send" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </form>
          <div class="panel-footer">
            <p class="hint">
              <svg class="icon-info" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                <path d="M12 16v-4M12 8h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>提示：本對話系統不具備上下文記憶功能，不支援連續對話，請在單次詢問中完整描述您的專利問題。</span>
            </p>
          </div>
        </div>
      </div>

      <!-- 專利資料庫視圖 -->
      <div id="db-view" class="view-content" style="display: none;">
        <div class="db-filter-bar">
          <div class="db-search-box">
            <div class="db-input-wrapper">
              <svg class="icon-search" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <input
                id="db-search-input"
                type="text"
                placeholder="輸入關鍵字搜尋題目或解答..."
              />
            </div>
          </div>
          
          <!-- 自訂欄位選單 -->
          <div class="custom-select" id="db-field-dropdown">
            <button class="select-trigger" type="button">
              <span class="field-trigger-text" data-value="all">全部欄位</span>
              <svg class="icon-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="select-panel">
              <div class="select-option active" data-value="all">全部欄位</div>
              <div class="select-option" data-value="question">僅限題目</div>
              <div class="select-option" data-value="answer">僅限解答</div>
            </div>
          </div>

          <!-- 自訂複選下拉選單 -->
          <div class="custom-multiselect" id="db-category-dropdown">
            <button class="multiselect-trigger" type="button">
              <span class="trigger-text">全部類別</span>
              <svg class="icon-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="multiselect-panel">
              <div class="panel-actions">
                <button type="button" class="btn-action-all">全選</button>
                <button type="button" class="btn-action-none">清除</button>
              </div>
              <div class="checkbox-list" id="db-checkbox-list">
                <!-- 由 JS 動態生成項目 -->
              </div>
            </div>
          </div>

          <button id="btn-db-search" class="btn-primary" type="button">
            <span>開始搜尋</span>
          </button>
        </div>

        <div class="db-results-wrapper">
          <div class="db-results-meta">
            <div class="db-results-count" id="db-results-count" style="display: none;">
              <!-- 由 JS 動態顯示筆數，例如「共找到 X 筆資料，顯示前 100 筆」 -->
            </div>
            <div class="db-page-size-container" id="db-page-size-container" style="display: none;">
              <span>每頁顯示</span>
              <select id="db-page-size-select" class="page-size-select">
                <option value="10">10 筆</option>
                <option value="20" selected>20 筆</option>
                <option value="50">50 筆</option>
                <option value="100">100 筆</option>
              </select>
            </div>
          </div>
          <div class="db-results-list" id="db-results-list">
            <div class="db-empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon-empty">
                <circle cx="11" cy="11" r="8"/>
                <path d="M21 21l-4.3-4.3M11 8v6M8 11h6"/>
              </svg>
              <p>請輸入關鍵字或選擇類別進行搜尋，將為您快速展示相應的專利問答條目。</p>
            </div>
          </div>
          <!-- 換頁導覽區 -->
          <div class="db-pagination-container" id="db-pagination" style="display: none;">
            <!-- JS 動態分頁 -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- 磨砂玻璃詳情彈窗 -->
  <div id="faq-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-container">
      <button id="modal-close" class="modal-close-btn" aria-label="關閉視窗">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="modal-header">
        <span id="modal-category" class="badge">類別</span>
        <h2 id="modal-question">條目問題</h2>
      </div>
      <div class="modal-body">
        <div id="modal-answer" class="modal-answer-content">條目解答</div>
      </div>
      <div class="modal-footer">
        <div class="modal-meta">
          <span class="meta-label">項次：</span>
          <span id="modal-id" class="meta-value">-</span>
        </div>
        <div class="modal-meta">
          <span class="meta-label">更新日期：</span>
          <span id="modal-updated" class="meta-value">-</span>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
